<!DOCTYPE html>
<html>
<head>
<style>
  body {
    width: 1080px; height: 1920px; /* Tamanho Story Real */
    margin: 0; padding: 0;
    font-family: 'Montserrat', sans-serif;
    background: url('SUA_FOTO_AQUI.jpg') no-repeat center center;
    background-size: cover;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; text-align: center;
  }

  .container { width: 900px; }

  .instagram-pill {
    background-color: #800000; /* Cor Vinho */
    color: white;
    font-size: 60px;
    font-weight: bold;
    padding: 10px 20px;
    line-height: 1.6;
    border-radius: 15px;
    /* MÁGICA AQUI: Acompanha a quebra de linha perfeitamente */
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
    display: inline;
  }
</style>
</head>
<body>
  <div class="container">
    <span class="instagram-pill">
      HAMBÚRGUER COM<br>TARJA AUTOMÁTICA
    </span>
  </div>
</body>
</html>
